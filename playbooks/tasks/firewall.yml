---
- name: Install the {{ firewall_pkg }}
  ansible.builtin.dnf:
    name: "{{ firewall_pkg }}"
    state: present

- name: Starts the {{ firewall_svc }} service
  ansible.builtin.systemd_service:
    name: "{{ firewall_svc }}"
    state: started
    enabled: true

- name: Enabling Firewall Rules
  ansible.posix.firewalld:
    service: "{{ item }}"
    state: enabled
    permanent: yes
    immediate: yes
  loop: "{{ rule }}"
