---
- name: Dynamically Creating /etc/hosts file using Jinja2 template
  hosts: all:!balancer
  gather_facts: false
  become: true
  vars:
    internal_network_nodes:
      - hostname: serverA
        ip_address: 10.10.1.10
        role: webserver
      - hostname: serverB
        ip_address: 10.10.1.20
        role: database
      - hostname: serverC
        ip_address: 10.10.1.30
        role: loadbalancer
  tasks:
    - name: Creating /etc/hosts file on remote servers
      ansible.builtin.template:
        src: templates/hosts.j2
        dest: /etc/hosts
        owner: root
        group: root
        mode: '0644'
      