---
ansible-navigator:
  mode: stdout
  ansible:
    config:
      help: false
      path: /home/devops/projects/ansible.cfg
    doc:
      help: false
      plugin:
        type: module
    inventory:
      entries:
      - /home/devops/projects/inventory
      help: false
    playbook:
      help: false
  ansible-builder:
    help: false
    workdir: /home/devops/projects
  ansible-runner:
    job-events: false
  app: settings
  collection-doc-cache-path: /home/devops/.cache/ansible-navigator/collection_doc_cache.db
  color:
    enable: true
    osc4: true
  editor:
    command: vi +{line_number} {filename}
    console: true
  enable-prompts: false
  exec:
    command: /bin/bash
    shell: true
  execution-environment:
    container-engine: podman
    #container-options:
    #  - "--user=devops"
    enabled: true
    volume-mounts:
      - src: .
        dest: /runner/project
      - src: $HOME/.ssh
        dest: /home/devops/.ssh
    #image: ghcr.io/ansible/community-ansible-dev-tools:latest
    image: my-custom-ee:latest
    pull:
        policy: missing
    # ---- Add this to force the container to execute from mount -----
    container-options:
        - "--workdir=/runner/project"
        #- "--net=host"   #[Only applicable if you are using WSL with podman]
    environment-variables:
      set:
        ANSIBLE_COLLECTIONS_PATHS: /runner/project/collections
  format: yaml
  images:
    details:
    - everything
  logging:
    append: true
    file: /home/devops/projects/ansible-navigator.log
    level: warning
  mode: stdout
  playbook-artifact:
    enable: false
    save-as: '{playbook_dir}/{playbook_name}-artifact-{time_stamp}.json'
  settings:
    effective: true
    sample: false
    schema: json
    sources: false
  time-zone: UTC